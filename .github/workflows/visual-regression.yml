name: Visual Regression

# Fails on unexplained screenshot drift. Never regenerates snapshots in CI.
# Intentional baseline updates must be committed from a reviewed local run
# with PLAYWRIGHT_UPDATE_SNAPSHOTS=1 (see scripts/check_visual_baselines.sh).

on:
  pull_request:
    paths:
      - 'client/tests/e2e/visual-baselines.spec.js'
      - 'client/tests/e2e/visual-baselines.spec.js-snapshots/**'
      - 'client/playwright.config.js'
      - 'theme/templates/**'
      - 'theme/static/**'
      - 'theme/static_src/**'
      - 'scripts/check_visual_baselines.sh'
      - '.github/workflows/visual-regression.yml'
  push:
    branches:
      - main
    paths:
      - 'client/tests/e2e/visual-baselines.spec.js'
      - 'client/tests/e2e/visual-baselines.spec.js-snapshots/**'
      - 'client/playwright.config.js'
      - 'theme/templates/**'
      - 'theme/static/**'
      - 'theme/static_src/**'
      - 'scripts/check_visual_baselines.sh'
      - '.github/workflows/visual-regression.yml'
  workflow_dispatch:

jobs:
  visual-baselines:
    name: Phase 1 visual baselines (no auto-regen)
    # Snapshots are captured on ubuntu-latest to match agent/CI Chromium rendering.
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Apply database migrations
        run: python manage.py migrate --noinput

      - name: Seed E2E user
        run: |
          python manage.py shell -c "
          from django.contrib.auth.models import User
          from contracts.models import Organization, OrganizationMembership
          user, _ = User.objects.get_or_create(username='e2e_owner', defaults={'email': 'e2e_owner@example.com'})
          user.set_password('e2e_pass_123')
          user.is_active = True
          user.save()
          org, _ = Organization.objects.get_or_create(name='E2E Org', defaults={'slug': 'e2e-org'})
          OrganizationMembership.objects.update_or_create(
              organization=org, user=user,
              defaults={'role': OrganizationMembership.Role.OWNER, 'is_active': True},
          )
          "

      - name: Forbid snapshot regeneration flags
        run: |
          chmod +x scripts/check_visual_baselines.sh
          if [[ "${PLAYWRIGHT_UPDATE_SNAPSHOTS:-}" == "1" ]]; then
            echo "PLAYWRIGHT_UPDATE_SNAPSHOTS must not be set in CI" >&2
            exit 1
          fi

      - name: Compare visual baselines (update-snapshots=none)
        env:
          CI: 'true'
          E2E_USERNAME: e2e_owner
          E2E_PASSWORD: e2e_pass_123
        run: bash scripts/check_visual_baselines.sh

      - name: Upload diff artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-diffs
          path: |
            client/test-results/**
            client/tests/e2e/**/*-actual.png
            client/tests/e2e/**/*-diff.png
          if-no-files-found: ignore
