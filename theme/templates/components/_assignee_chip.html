{% if user %}<span class="assignee-chip"><span class="assignee-chip-avatar avatar-gradient-bg">{{ user.first_name|default:user.username|slice:":1"|upper }}</span><span class="assignee-chip-name">{{ user.get_full_name|default:user.username }}</span></span>{% else %}<span class="assignee-chip assignee-chip-empty"><span class="assignee-chip-avatar assignee-chip-avatar-empty" aria-hidden="true"></span><span class="assignee-chip-name">Unassigned</span></span>{% endif %}
