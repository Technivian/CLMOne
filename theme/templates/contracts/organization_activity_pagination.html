{% if is_paginated %}
<nav aria-label="Pagination" class="mt-4 dc-ds-actions">
  {% if page_obj.has_previous %}
  <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.previous_page_number }}" class="dc-ds-button dc-ds-button--ghost">Previous</a>
  {% endif %}
  <span class="px-3 py-1 text-sm c-muted">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
  <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.next_page_number }}" class="dc-ds-button dc-ds-button--ghost">Next</a>
  {% endif %}
</nav>
{% endif %}
