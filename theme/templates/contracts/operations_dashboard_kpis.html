{% load clmone_format %}
<div class="dc-ds-metric-grid mb-6">
  {% for metric in metric_cards %}
  <article class="dc-ds-metric" data-health="{{ metric.health }}">
    <div class="dc-ds-metric__label">{{ metric.label }}</div>
    <div class="dc-ds-metric__value{% if metric.health == 'healthy' %} dc-ds-metric__value--clear{% endif %}">{{ metric.value }}</div>
    <div class="dc-ds-metric__note">
      <span>{{ metric.time_range }}</span>
      · Threshold {{ metric.threshold }}
      · Trend {{ metric.trend }}
      · <span class="{% if metric.health == 'critical' %}c-danger{% elif metric.health == 'attention' %}c-warning{% else %}c-success{% endif %}">{{ metric.health|title }}</span>
    </div>
    <div class="dc-ds-metric__note c-muted">{{ metric.note }}</div>
  </article>
  {% endfor %}
</div>
