<p class="text-desc-sm">Bump the revocation counter for all active members in this organization. They will be forced to sign in again on their next request.</p>
<div class="flex-between">
  <div class="text-desc-sm mb-0">Active members: <strong class="c-primary">{{ member_count }}</strong></div>
  <div class="dc-ds-actions">
    <a href="{% url 'organization_session_audit' %}" class="dc-ds-button dc-ds-button--ghost">Session audit</a>
    <a href="{% url 'organization_security_export' %}" class="dc-ds-button dc-ds-button--ghost">Export security CSV</a>
    <form method="post" data-confirm="Revoke sessions for all active organization members?">
      {% csrf_token %}
      <input type="hidden" name="action" value="revoke_sessions">
      <button type="submit" class="dc-ds-button dc-ds-button--ghost">Revoke all sessions</button>
    </form>
  </div>
</div>
