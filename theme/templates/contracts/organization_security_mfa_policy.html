<p class="text-desc-sm mb-0">Require every active member to enroll MFA before accessing protected pages.</p>

<form method="post" class="form-grid">
  {% csrf_token %}
  <label class="form-checkbox">
    <input type="checkbox" name="require_mfa" {% if organization.require_mfa %}checked{% endif %} class="mt-1 form-check-input">
    <span>
      <span class="form-check-text">Require MFA for all members</span>
      <span class="form-check-sub">When enabled, users without MFA are redirected until they enroll from their profile.</span>
    </span>
  </label>

  <label class="form-field">
    <span class="form-label">Session idle timeout (minutes)</span>
    <input
      type="number"
      min="5"
      name="session_idle_timeout_minutes"
      value="{{ organization.session_idle_timeout_minutes }}"
      class="input-base w-180 px-3 py-2 rounded-lg border"
    >
    <span class="text-desc-sm mb-0">Inactive users are signed out after this many minutes of idle time.</span>
  </label>

  <div class="dc-ds-actions">
    <button type="submit" class="dc-ds-button dc-ds-button--primary">Save security policy</button>
  </div>
</form>
