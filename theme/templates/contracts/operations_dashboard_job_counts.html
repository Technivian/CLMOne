<div class="dash-grid dash-grid-2">
  <div class="stat-card-lg">
    <div class="item-meta uppercase">Pending</div>
    <div class="kpi-value">{{ job_counts.pending }}</div>
  </div>
  <div class="stat-card-lg">
    <div class="item-meta uppercase">Running</div>
    <div class="kpi-value">{{ job_counts.running }}</div>
  </div>
  <div class="stat-card-lg">
    <div class="item-meta uppercase">Completed</div>
    <div class="kpi-value">{{ job_counts.completed }}</div>
  </div>
  <div class="stat-card-lg">
    <div class="item-meta uppercase">Failed</div>
    <div class="kpi-value">{{ job_counts.failed }}</div>
  </div>
</div>
