<form method="post" class="form-grid">
  {% csrf_token %}
  <div class="form-field">
    <label class="form-label">Identity provider</label>
    {{ form.identity_provider }}
  </div>

  <div class="form-field">
    <label class="form-label">SAML entity ID</label>
    {{ form.saml_entity_id }}
  </div>

  <div class="form-field">
    <label class="form-label">SAML SSO URL</label>
    {{ form.saml_sso_url }}
  </div>

  <div class="form-field">
    <label class="form-label">SAML SLO URL</label>
    {{ form.saml_slo_url }}
  </div>

  <div class="form-field">
    <label class="form-label">SAML metadata URL</label>
    {{ form.saml_metadata_url }}
  </div>

  <div class="form-field">
    <label class="form-label">SAML x509 certificate</label>
    {{ form.saml_x509_certificate }}
  </div>

  <label class="form-checkbox">
    {{ form.scim_enabled }}
    <span>
      <span class="form-check-text">Enable SCIM provisioning</span>
      <span class="form-check-sub">Bearer-token SCIM users API is enabled when checked.</span>
    </span>
  </label>

  <div class="dc-ds-actions">
    <button type="submit" class="dc-ds-button dc-ds-button--primary">Save identity settings</button>
  </div>
</form>
