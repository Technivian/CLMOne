<div class="dc-ds-actions{% if class_name %} {{ class_name }}{% endif %}">
  {% if submit_label %}
    <button type="submit" class="dc-ds-button dc-ds-button--primary">{{ submit_label }}</button>
  {% endif %}
  {% if cancel_href and cancel_label %}
    <a href="{{ cancel_href }}" class="dc-ds-button dc-ds-button--ghost">{{ cancel_label }}</a>
  {% endif %}
  {% if actions_template %}
    {% include actions_template %}
  {% endif %}
</div>
