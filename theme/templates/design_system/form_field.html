{% if field.is_hidden %}
  {{ field }}
{% else %}
  <div class="dc-ds-form-field{% if field.errors %} dc-ds-form-field--error{% endif %}{% if class_name %} {{ class_name }}{% endif %}">
    <label class="dc-ds-form-field__label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    <div class="dc-ds-form-field__control">
      {{ field }}
    </div>
    {% if field.help_text %}
      <p class="dc-ds-form-field__help">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
      <div class="dc-ds-form-field__errors">
        {% for error in field.errors %}
          <p>{{ error }}</p>
        {% endfor %}
      </div>
    {% endif %}
  </div>
{% endif %}
